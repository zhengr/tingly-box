        -H "Authorization: Bearer {{.KIMI_KEY}}" \
        -H "Accept: application/json" \
        {{ if .PROXY }}--proxy "{{.PROXY}}"{{ end }}
      - |
        cat << EOF
        {
          "consumed": 150,
          "remaining": 350
