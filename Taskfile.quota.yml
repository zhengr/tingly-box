# https://taskfile.dev

version: '3'

vars:
  PROXY: ""

tasks:
  anthropic:
    cmds:
      - |
        curl https://api.anthropic.com/api/oauth/usage \
        -H "Authorization: Bearer {{.ANTHROPIC_TOKEN}}" \
        -H "Accept: application/json" \
        -H "Content-Type: application/json" \
        -H "anthropic-beta: oauth-2025-04-20" \
        {{ if .PROXY }}--proxy "{{.PROXY}}"{{ end }}
      - |
        cat << EOF
        {
          "five_hour": {
            "utilization": 12.5,
            "resets_at": "2026-04-02T15:00:00Z"
          },
          "seven_day": {
            "utilization": 34.2,
            "resets_at": "2026-04-09T00:00:00Z"
          },
          "extra_usage": {
            "is_enabled": false,
            "utilization": 0,
            "used_credits": 0,
            "monthly_limit": 0
          }
        }
        EOF

  openai:
    cmds:
      - |
        curl https://api.openai.com/v1/usage \
        -H "Authorization: Bearer {{.OPENAI_KEY}}" \
        {{ if .PROXY }}--proxy "{{.PROXY}}"{{ end }}
      - |
        cat << EOF
        NOTE: OpenAI usage API often returns 404.
        Check https://platform.openai.com/usage for usage details.
        EOF

  gemini:
    cmds:
      - |
        curl -X POST https://cloudcode-pa.googleapis.com/v1internal:retrieveUserQuota \
        -H "Authorization: Bearer {{.GEMINI_TOKEN}}" \
        -H "Content-Type: application/json" \
        -d '{}' \
        {{ if .PROXY }}--proxy "{{.PROXY}}"{{ end }}
      - |
        cat << EOF
        {
          "buckets": [
            {
              "modelId": "gemini-2.5-pro",
              "remainingFraction": 0.75,
              "resetTime": "2026-04-03T00:00:00Z"
            },
            {
              "modelId": "gemini-2.5-flash",
              "remainingFraction": 0.90,
              "resetTime": "2026-04-03T00:00:00Z"
            }
          ]
        }
        EOF

  openrouter:
    aliases:
      - cli:dev
    cmds:
      - |
        curl https://openrouter.ai/api/v1/key \
        -H "Authorization: Bearer {{.OPENROUTER_KEY}}" \
        -H "Accept: application/json" \
        {{ if .PROXY }}--proxy "{{.PROXY}}"{{ end }}
      - |
        cat << EOF
        {
          "data": {
            "label": "sk-or-v1-c1a...5a2",
            "is_management_key": false,
            "is_provisioning_key": false,
            "limit": null,
            "limit_reset": null,
            "limit_remaining": null,
            "include_byok_in_limit": false,
            "usage": 0,
            "usage_daily": 0,
            "usage_weekly": 0,
            "usage_monthly": 0,
            "byok_usage": 0,
            "byok_usage_daily": 0,
            "byok_usage_weekly": 0,
            "byok_usage_monthly": 0,
            "is_free_tier": true,
            "expires_at": null,
            "creator_user_id": "user_xxx",
            "rate_limit": {
              "requests": -1,
              "interval": "10s",
              "note": "This field is deprecated and safe to ignore."
            }
          }
        }
        EOF

  codex:
    cmds:
      - |
        curl https://chatgpt.com/backend-api/wham/usage \
        -H "Authorization: Bearer {{.CODEX_KEY}}" \
        -H "Accept: application/json" \
        -H "User-Agent: codex-cli" \
        {{ if .CODEX_ACCOUNT_ID }}-H "ChatGPT-Account-Id: {{.CODEX_ACCOUNT_ID}}"{{ end }} \
        {{ if .PROXY }}--proxy "{{.PROXY}}"{{ end }}
      - |
        cat << EOF
        {
          "user_id": "user-I9Ki---jrzi2",
          "account_id": "user-I9Ki---zi2",
          "email": "@gmail.com",
          "plan_type": "free",
